externalDocs:
  description: Product documentation
  url: https://github.com/camaraproject/DeviceQualityIndicator

servers:
  - url: "{apiRoot}/media-streaming-rate/vwip"
    variables:
      apiRoot:
        default: http://localhost:8087
        description: |
          API root, defined by service provider, e.g.
          `api.example.com` or `api.example.com/somepath`

tags:
  - name: Media Streaming Rate
    description: |
      Retrieve the maximum media streaming bit rate supported for a given device.

paths:
  /retrieve-maximum-downstream-media-rate:
    post:
      security:
        - openId:
            - media-streaming-rate:retrieve-maximum-downstream-media-rate
      tags:
        - Media Streaming Rate
      summary: Get maximum downstream media streaming rate
      description: |
        Retrieve the maximum downstream media streaming rate for a device. This helps application
        developers determine the optimal media quality settings for their applications.

        When using a two-legged token, the device object MUST be provided.
        When using a three-legged token, the device object MUST NOT be provided as
        the device information will be extracted from the token.
      operationId: retrieveMaximumDownstreamMediaRate
      parameters:
        - $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"
      requestBody:
        description: Device information needed to determine media rate capabilities.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaStreamingRateRequest"
        required: true
      responses:
        "200":
          description: OK
          headers:
            x-correlator:
              $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaStreamingRateResponse"
        "400":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic400"
        "401":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic401"
        "403":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic403"
        "404":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic404"
        "422":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic422"
        "429":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic429"
        "503":
          $ref: "../common/CAMARA_common.yaml#/components/responses/Generic500"

components:
  securitySchemes:
    openId:
      $ref: "../common/CAMARA_common.yaml#/components/securitySchemes/openId"

    MediaStreamingRateRequest:
      type: object
      description: Defines the request body parameters
      properties:
        device:
          $ref: "../common/CAMARA_common.yaml#/components/schemas/Device"

    MediaStreamingRateResponse:
      type: object
      description: The maximum downstream media streaming bit rate supported for the device.
      properties:
        device:
          $ref: "#/components/schemas/DeviceResponse"
        maxDownstreamMediaBitRateSupported:
          type: integer
          description: The maximum downstream bit rate supported for the device
          example: 10
          format: int32
          minimum: 0
          maximum: 1024
        unit:
          type: string
          description: The unit of the bit rate (e.g., Mbps, Kbps)
          example: "Mbps"
          enum:
            - bps
            - kbps
            - Mbps
            - Gbps
            - Tbps
      required:
        - maxDownstreamMediaBitRateSupported
        - unit
